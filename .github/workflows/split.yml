name: Split Repo
on:
  push:
    branches: [main]

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Split and Push Frontend
        run: |
          git subtree split --prefix=frontend -b frontend-branch
          git push https://x-access-token:${{ secrets.FRONTEND_REPO_TOKEN }}@github.com/Pratyush-Nirwan/smart-shop-fe.git frontend-branch:main --force

      - name: Split and Push Backend
        run: |
          git subtree split --prefix=backend -b backend-branch
          git push https://x-access-token:${{ secrets.BACKEND_REPO_TOKEN }}@github.com/Pratyush-Nirwan/smart-shop-be.git backend-branch:main --force   